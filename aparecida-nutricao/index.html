<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<title>Aparecida Nutrição</title>
		<link rel="icon" href="favicon.ico" type="image/x-icon">
		<link rel="stylesheet" type="text/css" href="css/reset.css">
		<link rel="stylesheet" type="text/css" href="css/index.css">

	<link rel="stylesheet" href="../voltar-menu.css">
</head>
	<body>

		<header>
			<div class="container">
				<h1>Aparecida Nutrição</h1>
			</div>
		</header>
		<main>
			<section class="container">
				<h2>Pacientes cadastrados</h2>
				<table>
					<thead>
						<tr>
							<th>Nome</th>
							<th>Peso(kg)</th>
							<th>Altura(m)</th>
							<th>Gordura Corporal(%)</th>
							<th>IMC</th>
						</tr>
					</thead>
					<tbody id="tabela-pacientes">
						<tr class="paciente" >
							<td class="info-nome">Carlos</td>
							<td class="info-peso">100</td>
							<td class="info-altura">2.0</td>
							<td class="info-gordura">10</td>
							<td class="info-imc">0</td>
						</tr>

						<tr class="paciente" >
							<td class="info-nome">Lucas</td>
							<td class="info-peso">1080</td>
							<td class="info-altura">1.72</td>
							<td class="info-gordura">40</td>
							<td class="info-imc">0</td>
						</tr>

						<tr class="paciente" >
							<td class="info-nome">Erica</td>
							<td class="info-peso">54</td>
							<td class="info-altura">1.64</td>
							<td class="info-gordura">14</td>
							<td class="info-imc">0</td>
						</tr>

						<tr class="paciente">
							<td class="info-nome">Douglas</td>
							<td class="info-peso">85</td>
							<td class="info-altura">1.73</td>
							<td class="info-gordura">24</td>
							<td class="info-imc">0</td>
						</tr>
						<tr class="paciente" >
							<td class="info-nome">Tatiana</td>
							<td class="info-peso">46</td>
							<td class="info-altura">1.55</td>
							<td class="info-gordura">19</td>
							<td class="info-imc">0</td>
						</tr>
					</tbody>
				</table>

			</section>
		</main>
		<section class="container">
			<h2 id="titulo-form">Adicionar novo paciente</h2>

			<ul id ="msg-erro"></ul>
			<form id="form-adiciona">
				<div class="grupo">
					<label for=""></label>
					<input type="text" name="nome" id="nome" placeholder="Digite o nome do paciente" class ="campo">
				</div>

				<div class="grupo">
					<label for=""></label>
					<input type="text" name="peso" id="peso" placeholder="Digite o peso do paciente" class ="campo campo-medio">
				</div>

				<div class="grupo">
					<label for=""></label>
					<input type="text" name="altura" id="altura" placeholder="Digite a altura do paciente" class ="campo campo-medio">
				</div>

				<div class="grupo">
					<label for="gordura"></label>
					<input type="text" name="gordura" id="gordura" placeholder="Digite a gordura  do paciente" class ="campo campo-medio">
				</div>

				<button id="adicionar-paciente" class="botao bto-principal">Adicionar</button>
			</form>
		</section>
		<script src="js/principal.js"></script>
		<script src="js/form-adiciona.js"></script>
		<script src="js/remove-paciente.js"></script>
	<a class="voltar-menu" href="../index.html">Voltar ao menu</a>
</body>
</html>
